# AIGC Detector Toolkit 默认配置

engine:
  default: "ensemble"
  ensemble:
    fengci_weight: 0.0
    hc3_weight: 0.0
    openai_weight: 0.30
    binoculars_weight: 0.30
    lastde_weight: 0.40
    # 默认不启用本地大模型；显式配置模型并把权重调高后才参与 ensemble。
    local_logprob_weight: 0.0


# OpenAI 兼容 API（也可通过环境变量 OPENAI_API_KEY / OPENAI_BASE_URL / OPENAI_MODEL 设置）
# OPENAI_API_BASE 也可作为 OPENAI_BASE_URL 的兼容别名。




openai_api:
  api_base: "https://token-plan-cn.xiaomimimo.com/v1"
  api_key: "tp-coieog8ekddoaylhvsdxxe361fiyi59upsztz72px0kjuwp9"
  model: "mimo-v2.5"
  strategy: "perplexity"
  temperature: 1

# 润色模型 API（留空则复用 openai_api；也可通过 REFINER_API_KEY / REFINER_BASE_URL / REFINER_MODEL 设置）
refiner_api:
  api_base: "https://token-plan-cn.xiaomimimo.com/v1"
  api_key: "tp-coieog8ekddoaylhvsdxxe361fiyi59upsztz72px0kjuwp9"
  model: "mimo-v2.5"
  temperature: 0.3

# Binoculars API（留空则复用 openai_api 配置）
binoculars:
  api_base: ""
  api_key: ""
  model: ""

# 可选本地 logprob 检测器（默认关闭，不下载模型）
local_logprob:
  model_name_or_path: ""
  device: "cpu"
  max_length: 512
  stride: 256
  method: "logrank"  # logrank / perplexity
  local_files_only: false

# Lastde 多尺度分布熵检测器 (ICLR 2025)
lastde:
  embed_size: 3          # orbit 嵌入维度 (s)
  epsilon_factor: 10.0   # ε = epsilon_factor * n_tokens
  tau_prime: 5           # 最大尺度 (τ')
  agg: "std"             # 聚合函数: std / expstd / 2norm / range / exprange

# 文本提取
extraction:
  min_paragraph_length: 30
  skip_headings: true
  skip_captions: true
  skip_code_blocks: true

# 判定阈值
threshold:
  aigc_threshold: 0.5

# 性能
performance:
  # API 引擎批量检测并发数。建议 4-8；如果出现 429/限流，调低到 2-4。
  api_concurrency: 8

# 输出
output:
  dir: null
  json: true
  text: true
  html: true
  console: true
  verbose: false
