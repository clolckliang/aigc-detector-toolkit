# AIGC Detector Toolkit 默认配置

engine:
  default: "ensemble"
  ensemble:
    fengci_weight: 0.30
    hc3_weight: 0.20
    openai_weight: 0.25
    binoculars_weight: 0.25

# OpenAI 兼容 API（也可通过环境变量 OPENAI_API_KEY / OPENAI_BASE_URL / OPENAI_MODEL 设置）
# OPENAI_API_BASE 也可作为 OPENAI_BASE_URL 的兼容别名。
# 旧的 MIMO_API_KEY / MIMO_API_BASE / MIMO_MODEL 仍可作为兼容回退。
openai_api:
  api_base: "https://api.openai.com/v1"
  api_key: ""
  model: "gpt-4o-mini"
  strategy: "perplexity"

# Binoculars API（留空则复用 openai_api 配置）
binoculars:
  api_base: ""
  api_key: ""
  model: ""

# 文本提取
extraction:
  min_paragraph_length: 30
  skip_headings: true
  skip_captions: true
  skip_code_blocks: true

# 判定阈值
threshold:
  aigc_threshold: 0.5

# 输出
output:
  dir: null
  json: true
  text: true
  console: true
  verbose: false
